{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Registracija{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="glass-card p-4 shadow-lg">

            <h2 class="text-center mb-4">Registracija</h2>

            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}

                <button type="submit" class="btn btn-glass w-100 mt-3">
                    Registruotis
                </button>
            </form>

            <p class="text-center mt-3">
                Jau turite paskyrą?
                <a href="{% url 'login' %}">Prisijunkite</a>
            </p>

        </div>
    </div>
</div>
{% endblock %}
