{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="d-flex justify-content-center align-items-start" style="min-height: 100vh; padding-top: 120px;">
    <div class="glass-card p-4" style="width: 420px; border-radius: 16px;">

        <h2 class="mb-4 text-center text-light">Prisijungimas</h2>

        {% if form.errors %}
            <div class="alert alert-danger text-center">
                Neteisingas vartotojo vardas arba slaptažodis.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <!-- VARTOTOJO VARDAS -->
            <div class="mb-3 text-center">
                <label class="form-label text-light d-block">Vartotojo vardas</label>
                <input type="text"
                       name="{{ form.username.name }}"
                       class="form-control text-center"
                       required>
            </div>

            <!-- SLAPTAŽODIS -->
            <div class="mb-3 text-center">
                <label class="form-label text-light d-block">Slaptažodis</label>
                <input type="password"
                       name="{{ form.password.name }}"
                       class="form-control text-center"
                       required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-2">Prisijungti</button>
        </form>

        <p class="mt-3 text-center">
            <a href="{% url 'password_reset' %}" class="text-light">Pamiršote slaptažodį?</a>
        </p>

    </div>
</div>

{% endblock %}
