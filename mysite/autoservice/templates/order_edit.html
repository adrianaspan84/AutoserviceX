{% extends "base.html" %}
{% load static %}

{% block title %}Redaguoti užsakymą{% endblock %}

{% block content %}

<h1 class="text-center mb-4 fade-in" style="font-size: 48px;">Redaguoti užsakymą</h1>

<div class="card p-4 fade-in" style="max-width: 700px; margin: auto;">

    <form method="POST">
        {% csrf_token %}

        <!-- Automobilis (neredaguojamas) -->
        <div class="mb-3">
            <label class="form-label fw-bold">Automobilis</label>
            <input type="text" class="form-control glass-input" value="{{ order.car }}" disabled>
        </div>

        <!-- Data -->
        <div class="mb-3">
            <label class="form-label fw-bold">Užsakymo data</label>
            <input type="date" name="date" class="form-control glass-input"
                   value="{{ order.date|date:'Y-m-d' }}" required>
        </div>

        <!-- Grąžinimo data -->
        <div class="mb-3">
            <label class="form-label fw-bold">Grąžinimo data</label>
            <input type="date" name="return_date" class="form-control glass-input"
                   value="{{ order.return_date|date:'Y-m-d' }}">
        </div>

        <!-- Aprašymas (TinyMCE) -->
        <div class="mb-3">
            <label class="form-label fw-bold">Aprašymas</label>
            <textarea name="description" class="form-control tinymce">{{ order.description }}</textarea>
        </div>

        <!-- Statusas -->
        <div class="mb-3">
            <label class="form-label fw-bold">Statusas</label>
            <select name="status" class="form-select glass-input">
                {% for value, label in order.STATUS_CHOICES %}
                    <option value="{{ value }}" {% if order.status == value %}selected{% endif %}>
                        {{ label }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="d-flex justify-content-between mt-4">
            <a href="{% url 'uzsakymas' order.id %}" class="btn btn-outline-secondary">
                ← Atgal
            </a>

            <button type="submit" class="btn btn-primary px-4">
                Išsaugoti pakeitimus
            </button>
        </div>

    </form>
</div>

<style>
    .glass-input {
        background: rgba(255, 255, 255, 0.08) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        color: white !important;
        backdrop-filter: blur(8px);
    }
    .glass-input:focus {
        border-color: #7dd3fc !important;
        box-shadow: 0 0 10px rgba(125, 211, 252, 0.5);
    }
</style>

{% endblock %}
