{% extends "base.html" %}
{% block title %}Paslaugos{% endblock %}

{% block content %}
<h1 class="text-center mb-4">Paslaugų sąrašas</h1>

<table class="table table-dark table-striped">
    <thead>
        <tr>
            <th>Pavadinimas</th>
            <th>Kaina (€)</th>
        </tr>
    </thead>
    <tbody>
        {% for s in services %}
        <tr>
            <td>{{ s.name }}</td>
            <td>{{ s.price }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
