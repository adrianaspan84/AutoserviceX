{% extends "base.html" %}
{% load static %}

{% block title %}Redaguoti profilį{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 glass-card p-4">

            <h3 class="text-center mb-4">Redaguoti profilį</h3>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <label class="form-label">Avataras</label>
                <input type="file" name="avatar" class="form-control mb-3">

                <label class="form-label">Aprašymas</label>
                {{ form.bio }}

                <button type="submit" class="btn btn-primary w-100 mt-3">
                    Išsaugoti
                </button>
            </form>

        </div>
    </div>
</div>
{% endblock %}
