{% load static %}
<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Autoservisas{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>

<!-- Bootstrap JS (dropdown veikimui būtinas) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Aurora Background -->
<canvas id="auroraCanvas"></canvas>

<nav class="glass-nav">
    <img src="{% static 'img/wheel.png' %}" class="nav-wheel" alt="logo">

    <a class="{% if request.path == '/' %}active{% endif %}" href="{% url 'index' %}">Pradžia</a>
    <a class="{% if '/automobiliai' in request.path %}active{% endif %}" href="{% url 'automobiliai' %}">Automobiliai</a>
    <a class="{% if '/uzsakymai' in request.path %}active{% endif %}" href="{% url 'uzsakymai' %}">Užsakymai</a>
    <a class="{% if '/services' in request.path %}active{% endif %}" href="{% url 'services' %}">Paslaugos</a>

    <div class="ms-auto d-flex align-items-center">

        {% if user.is_authenticated %}

        <div class="dropdown">
            <a class="d-flex align-items-center text-light dropdown-toggle"
               href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false"
               style="text-decoration:none; cursor:pointer;">

                <!-- Standartinė Bootstrap user ikona -->
                <i class="fa-solid fa-circle-user"
                   style="font-size: 28px; margin-right: 8px;"></i>

                {{ user.username }}
            </a>

            <ul class="dropdown-menu dropdown-menu-end glass-card p-2" style="min-width: 180px;">
                <li><a class="dropdown-item" href="{% url 'password_change' %}">Keisti slaptažodį</a></li>
                <li><hr class="dropdown-divider"></li>

                <!-- 🔥 NAUJAS VEIKIANTIS LOGOUT -->
               <li><a class="dropdown-item text-danger" href="/logout/">Atsijungti</a></li>

            </ul>
        </div>

        {% else %}

        <a class="{% if '/accounts/login' in request.path %}active{% endif %}" href="{% url 'login' %}">
            Prisijungti
        </a>

        {% endif %}
    </div>

</nav>

<main class="content container">
    {% block content %}{% endblock %}
</main>

<script src="{% static 'js/aurora.js' %}"></script>
<script src="{% static 'js/cars.js' %}"></script>

</body>
</html>
