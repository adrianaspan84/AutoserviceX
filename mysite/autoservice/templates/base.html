<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Autoservisas{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <!-- Static CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>

<!-- Modernus navbar -->
<nav class="navbar navbar-expand-lg shadow-sm" style="background-color: #0d6efd;">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="{% url 'index' %}">Autoservisas</a>

        <div>
            <ul class="navbar-nav">

                <!-- Automobiliai -->
                <li class="nav-item">
                    <a class="nav-link text-white {% if '/automobiliai' in request.path %}active fw-bold{% endif %}"
                       href="{% url 'automobiliai' %}">
                        Automobiliai
                    </a>
                </li>

                <!-- Užsakymai -->
                <li class="nav-item">
                    <a class="nav-link text-white {% if '/uzsakymai' in request.path %}active fw-bold{% endif %}"
                       href="{% url 'uzsakymai' %}">
                        Užsakymai
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>


<!-- Puslapio turinys -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
